name: Deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is named master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Keeps compatibility stable on the runner
          

      - name: Install Dependencies
        run: npm install

      # We upload the source code directly because Express doesn't need a compilation/build step
      - name: Zip Artifact for Deployment
        run: zip -r release.zip . -x ".git/*" ".github/*"

      - name: Upload Artifact for Deployment Job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download Artifact from Build Job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip Artifact
        run: unzip release.zip && rm release.zip

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'YOUR_AZURE_WEBAPP_NAME' # <-- Replace with your actual Azure Web App name
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_XXXXX }} # <-- Leave this matching your secret name
