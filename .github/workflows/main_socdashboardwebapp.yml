name: Deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        
      - name: 'Deploy to Azure Web App'
              uses: azure/webapps-deploy@v3
              with:
                app-name: 'YOUR_AZURE_WEBAPP_NAME' # <-- Make sure this matches your Azure app name
                publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }} # <-- Updated to match your new secret!
